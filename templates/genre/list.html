{% extends 'base.html' %}
{% block title %}Genres{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Genres</h3>
    <a href="{% url 'genre_create' %}" class="btn btn-dark">Add Genre</a>
</div>
<hr>
<div class="row g-3">
    {% for genre in genres %}
        <div class="col-md-4 col-lg-3">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">{{ genre.name }}</h5>
                    <p class="card-text small text-muted">{{ genre.description|truncatewords:20 }}</p>
                </div>
                <div class="card-footer bg-transparent d-flex justify-content-between">
                    <a href="{% url 'genre_edit' genre.pk %}" class="btn btn-sm btn-outline-dark">Edit</a>
                    <a href="{% url 'genre_delete' genre.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                </div>
            </div>
        </div>
    {% empty %}
        <div class="col-12 text-center py-5">
            <i class="bi bi-tags text-muted" style="font-size: 4rem;"></i>
            <h4 class="text-muted mt-3">No genres yet</h4>
            <a href="{% url 'genre_create' %}" class="btn btn-dark mt-2">Add First Genre</a>
        </div>
    {% endfor %}
</div>
{% endblock %}
